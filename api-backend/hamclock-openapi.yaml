openapi: 3.0.3
info:
  title: HamClock API
  description: API endpoints for HamClock — a real-time amateur radio clock and propagation
    display application.
  version: 1.0.0
  license:
    name: CC BY-ND 4.0
    url: https://creativecommons.org/licenses/by-nd/4.0/
  contact:
    name: HamClock
    url: https://www.clearskyinstitute.com/ham/HamClock/
servers:
- url: http://clearskyinstitute.com
  description: Clear Sky Institute (primary)
- url: http://ohb.hamclock.app
  description: OHB HamClock instance
- url: http://hamclock.com
  description: HamClock.com
tags:
- name: Solar Weather
  description: Solar flux, X-ray, Bz, solar wind, and space weather data
- name: Geomagnetic
  description: Geomagnetic indices including K-index and DST
- name: Propagation
  description: HF band condition and MUF prediction scripts
- name: Reporters
  description: PSK Reporter, RBN, and WSPR spot data
- name: Maps
  description: Day and night map overlays at various resolutions
- name: SDO Images
  description: Solar Dynamics Observatory solar imagery
- name: Satellites
  description: Satellite tracking data
- name: Weather
  description: World weather and local weather data
- name: Miscellaneous
  description: Contests, DXpeditions, city data, version info, and more
