  /ham/HamClock/fetchVOACAP-MUF.pl:
    get:
      tags:
      - Propagation
      summary: fetchVOACAP-MUF.pl
      description: Standard HamClock API endpoint.
      parameters:
      - name: HEIGHT
        in: query
        required: true
        description: HamClock map pixel height
        schema:
          type: number
          enum:
          - 330
          - 660
          - 990
          - 1320
          - 1980
          - 2640
          - 2870
          - 3960
      - name: MHZ
        in: query
        required: false
        schema:
          type: number
      - name: MODE
        in: query
        required: true
        description: 'Propagation mode: 3=WSPR 13=FT8 17=FT4 19=CW 22=RTTY 38=SSB
          49=AM'
        schema:
          type: number
          enum:
          - 3
          - 13
          - 17
          - 19
          - 22
          - 38
          - 49
      - name: MONTH
        in: query
        required: true
        schema:
          type: number
      - name: PATH
        in: query
        required: true
        description: 'Path: 0=short 1=long'
        schema:
          type: number
          enum:
          - 0
          - 1
      - name: TOA
        in: query
        required: true
        schema:
          type: number
          minimum: 0.1
          maximum: 30.0
        description: 'Units: degrees'
      - name: TXLAT
        in: query
        required: true
        schema:
          type: number
      - name: TXLNG
        in: query
        required: true
        schema:
          type: number
      - name: UTC
        in: query
        required: true
        schema:
          type: number
      - name: WATTS
        in: query
        required: true
        schema:
          type: number
      - name: WIDTH
        in: query
        required: true
        description: HamClock map pixel width
        schema:
          type: number
          enum:
          - 660
          - 1320
          - 1980
          - 2640
          - 3960
          - 5280
          - 5940
          - 7920
      - name: YEAR
        in: query
        required: true
        schema:
          type: number
      - $ref: '#/components/parameters/AntControlEnum_ANTDEDXCONTROL'
      - $ref: '#/components/parameters/AntIndexEnum_ANTDEINDEX'
      - $ref: '#/components/parameters/AntIndexEnum_ANTDXINDEX'
      - name: ANTDEAZ
        in: query
        required: false
        schema:
          type: number
          minimum: 0.0
          maximum: 359.9
        description: 'Units: degrees'
      - name: ANTDXAZ
